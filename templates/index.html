<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Upload Candidate Resume</h1>

    <form
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
    >

        <input
            type="file"
            name="resume"
            required
        >

        <button type="submit">
            Upload Resume
        </button>

    </form>

</div>

</body>
</html>
