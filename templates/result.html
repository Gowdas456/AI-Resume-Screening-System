<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Resume Screening Result</h1>

    <h2>Skills Found</h2>

    <ul>

        {% for skill in skills %}

        <li>{{ skill }}</li>

        {% endfor %}

    </ul>

    <h2>Matched Skills</h2>

    <ul>

        {% for skill in matched_skills %}

        <li>{{ skill }}</li>

        {% endfor %}

    </ul>

    <h2>Matching Score</h2>

    <p>{{ score }}%</p>

    <h2>Status</h2>

    <p>{{ status }}</p>

    <a href="/uploadpage">
        Upload Another Resume
    </a>

</div>

</body>
</html>
